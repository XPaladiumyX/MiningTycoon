# ═══════════════════════════════════════════════════════════════════════════════
#  PRESTIGE / REBIRTH
#  Chaque zone se termine par un portail Rebirth.
#  → Level reset à 1 après chaque Rebirth
#  → Bonus EXP permanent cumulable (+6 / +8 / +10 / +12 / +14% = +50% total)
#  → Récompenses croissantes
# ═══════════════════════════════════════════════════════════════════════════════
prestige:
  spawn:
    world: "mining_tycoon"
    x: -5
    y: 122
    z: 24
    yaw: -180
    pitch: 0.5

  portals:

    # ── Rebirth 1 — Fin Zone 1 — Level 240 ──────────────────────────────────
    rebirth_portal_1:
      world: "mining_tycoon"
      region:
        min: { x: 30, y: 127, z: 20 }
        max: { x: 32, y: 130, z: 20 }
      level-requirement: 240
      type: "rebirth_1"

    # ── Rebirth 2 — Fin Zone 2 — Level 600 ──────────────────────────────────
    rebirth_portal_2:
      world: "mining_tycoon"
      region:
        min: { x: 45, y: 100, z: 45 }
        max: { x: 48, y: 103, z: 45 }
      level-requirement: 600
      type: "rebirth_2"

    # ── Rebirth 3 — Fin Zone 3 — Level 1100 ─────────────────────────────────
    rebirth_portal_3:
      world: "mining_tycoon"
      region:
        min: { x: 60, y: 90, z: 60 }
        max: { x: 63, y: 93, z: 60 }
      level-requirement: 1100
      type: "rebirth_3"

    # ── Rebirth 4 — Fin Zone 4 — Level 1450 ─────────────────────────────────
    rebirth_portal_4:
      world: "mining_tycoon"
      region:
        min: { x: 80, y: 85, z: 80 }
        max: { x: 83, y: 88, z: 80 }
      level-requirement: 1450
      type: "rebirth_4"

    # ── Rebirth 5 — Fin Zone 5 — Level 2100 — FINAL ──────────────────────────
    rebirth_portal_5:
      world: "mining_tycoon"
      region:
        min: { x: 100, y: 80, z: 100 }
        max: { x: 103, y: 83, z: 100 }
      level-requirement: 2100
      type: "rebirth_5"

  # ── Définitions et récompenses ─────────────────────────────────────────────
  rebirth_1:
    level-requirement: 240
    reset-level: true
    exp-multiplier-bonus: 0.06      # +6% EXP permanent
    rewards:
      diamonds: 3
      coins: 50000
      zentium: 1

  rebirth_2:
    level-requirement: 600
    reset-level: true
    exp-multiplier-bonus: 0.08      # +8% EXP permanent  (cumulé : +14%)
    rewards:
      diamonds: 6
      coins: 180000
      zentium: 3

  rebirth_3:
    level-requirement: 1100
    reset-level: true
    exp-multiplier-bonus: 0.10      # +10% EXP permanent (cumulé : +24%)
    rewards:
      diamonds: 12
      coins: 500000
      zentium: 6

  rebirth_4:
    level-requirement: 1450
    reset-level: true
    exp-multiplier-bonus: 0.12      # +12% EXP permanent (cumulé : +36%)
    rewards:
      diamonds: 20
      coins: 1200000
      zentium: 10

  rebirth_5:
    level-requirement: 2100
    reset-level: true
    exp-multiplier-bonus: 0.14      # +14% EXP permanent (cumulé : +50%)
    rewards:
      diamonds: 35
      coins: 3000000
      zentium: 20

# Community Generator Settings
community-generator:
  enabled: true
  drop-chances:
    redstone-reward: 500
    zentium: 666
    armor: 1250
    boost: 1500
  rewards:
    exp:
      min: 150
      max: 400
    coins:
      min: 500
      max: 2000

# Database Settings
database:
  type: "yaml" # yaml or mysql
  mysql:
    host: "localhost"
    port: 3306
    database: "miningtycoon"
    username: "root"
    password: "password"

# Messages
messages:
  prefix: "§7[§6MiningTycoon§7]"
  level-up: "§6§lLEVEL UP! §eYou are now level §6%level%"
  prestige-broadcast: "§8[§d⚡ Prestige §8] §6%player% §ehas reached §dPrestige %prestige%§e!"
  zone-locked: "§7[§e!§7] §cYou must be level §6%level% §cto enter this zone!"
  staff-mode-enabled: "§aMode: §lPlayer §7(Break = Rewards)"
  staff-mode-disabled: "§cMode: §lStaff §7(Break = No Rewards)"

  prestige:
