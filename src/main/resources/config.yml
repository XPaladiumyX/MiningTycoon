# MiningTycoon Configuration File
# ═══════════════════════════════════════════════════════════════════════════════
#  5 ZONES  |  40 MINES  |  MAX LEVEL 2100  |  5 PORTAILS REBIRTH
# ───────────────────────────────────────────────────────────────────────────────
#  ZONE 1  │ Mines  1– 9 │ Levels    0 –  232 │ Coal → Diamond Ore
#  ZONE 2  │ Mines 10–17 │ Levels  255 –  563 │ Emerald → Deepslate Diamond
#  ZONE 3  │ Mines 18–26 │ Levels  625 – 1080 │ Nether (Emerald DS → Crying Obsidian)
#  ZONE 4  │ Mines 27–31 │ Levels 1125 – 1395 │ End (Endstone → Obsidian)
#  ZONE 5  │ Mines 32–40 │ Levels 1480 – 2058 │ Mineral Blocks (Coal → Netherite)
# ── Portails Rebirth : Lv 240 / 600 / 1100 / 1450 / 2100 ────────────────────
# ═══════════════════════════════════════════════════════════════════════════════

settings:
  world-name: "mining_tycoon"
  max-level: 2100
  level-up-multiplier: 1.08

economy:
  use-commands: true
  command: "coins give %player% %amount%"
  currency-symbol: "⛁"

afk:
  enabled: true
  location:
    x: 9
    y: 125
    z: 19
  rewards:
    exp-per-tick: 1
    money-per-tick: 1

afk-settings:
  idle-threshold: 300

boosts:
  exp:
    min-multiplier: 1.0
    max-multiplier: 3.0
    min-duration: 60
    max-duration: 300
    super-rare-chance: 200
    super-rare-multiplier: 3.5
    super-rare-duration: 3600
  coins:
    multiplier: 2.0
    min-duration: 60
    max-duration: 300

# ═══════════════════════════════════════════════════════════════════════════════
#  ZONE REQUIREMENTS — level minimum pour débloquer chaque mine
# ═══════════════════════════════════════════════════════════════════════════════
zones:
  push-delay: 5
  max-pushes: 3
  requirements:

    # ── ZONE 1  (Coal Ore → Diamond Ore) ────────────────────────────────────
    2: 15   # Iron Ore
    3: 33   # Raw Iron Ore
    4: 55   # Copper Ore
    5: 82   # Raw Copper Ore
    6: 113   # Gold Ore
    7: 148   # Raw Gold Ore
    8: 188   # Lapis Ore
    9: 232   # Diamond Ore

    # ── ZONE 2  (Emerald → Deepslate Diamond) ───────────────────────────────
    10: 255   # Emerald
    11: 290   # Amethyst Block
    12: 328   # Deepslate Coal Ore
    13: 369   # Deepslate Iron Ore
    14: 413   # Deepslate Copper Ore
    15: 460   # Deepslate Gold Ore
    16: 510   # Deepslate Lapis Ore
    17: 563   # Deepslate Diamond Ore

    # ── ZONE 3  (Nether) ────────────────────────────────────────────────────
    18: 625   # Deepslate Emerald Ore
    19: 668   # Nether Gold Ore
    20: 715   # Quartz Ore
    21: 766   # Gilded Blackstone
    22: 821   # Obsidian
    23: 880   # Glowstone
    24: 943   # Quartz Block
    25: 1010  # Ancient Debris
    26: 1080  # Crying Obsidian

    # ── ZONE 4  (End) ───────────────────────────────────────────────────────
    27: 1125  # Endstone
    28: 1185  # End Stone Bricks
    29: 1250  # Purpur Block
    30: 1320  # Chorus Plants
    31: 1395  # Obsidian (End)

    # ── ZONE 5  (Mineral Blocks — FINAL) ────────────────────────────────────
    32: 1480  # Coal Block
    33: 1558  # Iron Block
    34: 1641  # Lodestone
    35: 1729  # Copper Block
    36: 1822  # Gold Block
    37: 1920  # Lapis Block
    38: 2023  # Diamond Block
    39: 2040  # Emerald Block
    40: 2058  # Netherite Block

