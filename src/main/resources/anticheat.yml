# Anti-Cheat Configuration File
# MiningTycoon Movement Protection
# 
# IMPORTANT: This anti-cheat is designed to be LENIENT and SAFE
# It uses realistic Minecraft vanilla movement values with generous tolerance
# to avoid false positives during normal gameplay.
#
# Vanilla Minecraft movement reference:
# - Walking: ~0.2 blocks/tick
# - Sprinting: ~0.28 blocks/tick  
# - Sprint-jumping: ~0.35 blocks/tick
# - Jump duration: ~12-25 ticks depending on Jump Boost
# - Gravity: 0.08 per tick, initial jump velocity: 0.42
#
# All thresholds below include generous multipliers for safety.

# ═══════════════════════════════════════════════════════════════════════════════
#  GENERAL SETTINGS
# ═══════════════════════════════════════════════════════════════════════════════
enabled: true

# Debug mode - logs all detections (use only for testing!)
debug: false

# ═══════════════════════════════════════════════════════════════════════════════
#  SPEED HACK DETECTION
# ═══════════════════════════════════════════════════════════════════════════════
speed:
  enabled: true
  
  # Maximum horizontal speed threshold (blocks per tick)
  max-horizontal-speed: 0.6
  
  # Tolerance: how many violations before rollback (lower = more strict)
  tolerance: 4
  
  # Check interval in ticks (higher = less CPU, more lenient)
  check-interval: 1

# ═══════════════════════════════════════════════════════════════════════════════
#  FLY HACK DETECTION  
# ═══════════════════════════════════════════════════════════════════════════════
fly:
  enabled: true
  
  # Maximum ticks a player can stay in air without jumping
  max-air-ticks: 30
  
  # Tolerance: how many violations before rollback (lower = more strict)
  tolerance: 4
  
  # Check interval in ticks
  check-interval: 1

# ═══════════════════════════════════════════════════════════════════════════════
#  FLY HACK DETECTION  
# ═══════════════════════════════════════════════════════════════════════════════
fly:
  enabled: true
  
  # Maximum ticks a player can stay in air without jumping
  max-air-ticks: 30
  
  # Tolerance: how many violations before rollback (lower = more strict)
  tolerance: 4
  
  # Check interval in ticks
  check-interval: 1

# ═══════════════════════════════════════════════════════════════════════════════
#  ROLLBACK SETTINGS
# ═══════════════════════════════════════════════════════════════════════════════
rollback:
  # Use last known safe position for rollback
  use-last-safe-position: true
  
  # Velocity to apply after rollback (push slightly up)
  vertical-push: 0.1

# ═══════════════════════════════════════════════════════════════════════════════
#  EXCLUDED CONDITIONS
# ═══════════════════════════════════════════════════════════════════════════════
exclusions:
  # Players with this permission bypass anti-cheat
  bypass-permission: "miningtycoon.anticheat.bypass"
  
  # Don't flag players in these gamemodes
  excluded-gamemodes:
    - creative
    - spectator
  
  # Don't flag players with these potion effects (already accounted for in calculations)
  allowed-effects:
    - speed
    - slowness
    - jump_boost
    - levitation
    - slow_falling
  
  # Don't flag players on these blocks (特殊 movement)
  safe-blocks:
    - WATER
    - LAVA
    - SLIME_BLOCK
    - HONEY_BLOCK
    - VINE
    - LADDER
    - SCAFFOLDING
    - SOUL_SAND
    - SOIL
  
  # Don't flag players with external velocity (knockback, etc.)
  ignore-external-velocity: true
  
  # Minimum velocity magnitude to consider as "external"
  # Above this, movement is assumed to be from knockback/plugin
  external-velocity-threshold: 3.0